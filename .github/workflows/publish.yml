name: Publish Docker image to GHCR

on:
  push:
    branches: [ main ]

# Request repository-level permissions so GITHUB_TOKEN can publish packages
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print runner info (diagnostic)
        run: |
          echo "Runner: $(uname -a)"
          echo "User: $(id -u -n)"
          echo "GitHub actor: $GITHUB_ACTOR"

      - name: Show docker version (diagnostic)
        run: docker --version || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR using `GHCR_TOKEN` (if provided)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to GHCR using `GITHUB_TOKEN` (fallback)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/africa-energy-mcp:latest
          file: Dockerfile
